<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --crow-orange: #FF8C00; --crow-bg: #0d0d0d; }
        body { font-family: sans-serif; background: var(--crow-bg); color: white; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--crow-orange); font-size: 18px; text-align: center; text-transform: uppercase; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--crow-orange); margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 18px; background: var(--crow-orange); border: none; border-radius: 12px; color: black; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🦅 AngryCrows Intelligence</h1>
    <div class="card">
        <div class="input-group">
            <label>CALLSIGN (НИК)</label>
            <input type="text" id="nick" placeholder="Введите ник...">
        </div>
        <div class="input-group">
            <label>RESISTANCE (СТОЙКОСТЬ)</label>
            <input type="number" id="res">
        </div>
        <div class="input-group">
            <label>FENCOR SYMBOLS (%)</label>
            <input type="number" id="fc" value="0" step="0.1">
        </div>
        <div class="input-group">
            <label>SKUT-TUM (%)</label>
            <input type="number" id="sc" value="0" step="0.1">
        </div>
        <button class="btn" onclick="sendData()">Отправить в штаб</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функция кодирования, которая НЕ БОИТСЯ русских букв
        function safeEncode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function sendData() {
            const BOT_NAME = "raven_resist_bot";
            let nick = document.getElementById('nick').value.trim();
            let res = parseFloat(document.getElementById('res').value);

            if (!nick || isNaN(res)) {
                tg.showAlert("Ошибка: Укажите ник и стойкость!");
                return;
            }

            let payload = {
                a: "s",
                n: nick,
                r: res,
                f: parseFloat(document.getElementById('fc').value || 0),
                s: parseFloat(document.getElementById('sc').value || 0)
            };

            try {
                let encoded = safeEncode(JSON.stringify(payload));
                let link = `https://t.me/${BOT_NAME}?start=${encoded}`;
                
                // Сначала открываем ссылку, потом закрываем приложение
                tg.openTelegramLink(link);
                setTimeout(() => { tg.close(); }, 350);
            } catch (e) {
                tg.showAlert("JS ERROR: " + e.message);
            }
        }
    </script>
</body>
</html>
