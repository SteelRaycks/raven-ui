<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue-bg: #0A1929; --blue-card: #132F4C; --blue-accent: #007AFF; --blue-light: #5AC8FA; }
        body { font-family: -apple-system, sans-serif; background: var(--blue-bg); color: #fff; margin: 0; padding: 0; }
        .tabs { display: flex; background: var(--blue-card); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: var(--blue-light); opacity: 0.5; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--blue-accent); color: #fff; }
        .container { padding: 20px; display: none; }
        .container.active { display: block; }
        .card { background: var(--blue-card); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--blue-light); text-align: center; margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--blue-light); margin-bottom: 5px; text-transform: uppercase; opacity: 0.8; }
        input { width: 100%; padding: 12px; background: #001E3C; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue-accent); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; background: var(--blue-accent); text-transform: uppercase; margin-top: 10px; }
        .btn-rank { background: transparent; border: 1px solid var(--blue-accent); }
    </style>
</head>
<body>
    <div class="tabs">
        <div id="t-form" class="tab active" onclick="switchTab('form')">АН
