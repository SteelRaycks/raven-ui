<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0A1929; color: #fff; margin: 0; padding: 20px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #132F4C; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #5AC8FA; opacity: 0.6; }
        .tab.active { opacity: 1; border-bottom: 2px solid #007AFF; font-weight: bold; }
        .card { background: #132F4C; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .content { display: none; }
        .content.active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #5AC8FA; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #001E3C; border: 1px solid #1e4976; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #007AFF; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-alt { background: transparent; border: 1px solid #007AFF; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="t1" class="tab active" onclick="show('form', 't1')">АНКЕТА</div>
        <div id="t2" class="tab" onclick="show('rank', 't2')">РЕЙТИНГ</div>
    </div>

    <div id="form" class="content active">
        <div class="card">
            <h3 style="text-align:center; color:#5AC8FA; margin-top:0;">🦅 ANGRY CROWS INTEL</h3>
            <div class="input-group">
                <label>Позывной (Ник)</label>
                <input type="text" id="nick" placeholder="Введите ник">
            </div>
            <div class="input-group">
                <label>Стойкость</label>
                <input type="number" id="res">
            </div>
            <div class="input-group">
                <label>Фенкор (%)</label>
                <input type="number" id="fc" value="0">
            </div>
            <div class="input-group">
                <label>Скут-Тум (%)</label>
                <input type="number" id="sc" value="0">
            </div>
            <button class="btn" onclick="send('s')">ОТПРАВИТЬ</button>
        </div>
    </div>

    <div id="rank" class="content">
        <div class="card">
            <h3 style="text-align:center; color:#5AC8FA; margin-top:0;">🏆 РЕЙТИНГ</h3>
            <button class="btn btn-alt" onclick="send('get_rating')">ВЫВЕСТИ В ЧАТ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function show(cId, tId) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(cId).classList.add('active');
            document.getElementById(tId).classList.add('active');
        }

        // Правильное кодирование кириллицы (UTF-8 -> Base64)
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function send(action) {
            let payload = { a: action };
            if (action === 's') {
                let n = document.getElementById('nick').value.trim();
                let r = parseFloat(document.getElementById('res').value);
                if (!n || isNaN(r)) { tg.showAlert("Заполните ник и стойкость!"); return; }
                payload.n = n;
                payload.r = r;
                payload.f = parseFloat(document.getElementById('fc').value || 0);
                payload.s = parseFloat(document.getElementById('sc').value || 0);
            }

            try {
                let encoded = b64EncodeUnicode(JSON.stringify(payload));
                // Используем прямое открытие ссылки
                tg.openTelegramLink("https://t.me/raven_resist_bot?start=" + encoded);
                tg.close();
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>
