<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .card { background: #262626; border: 1px solid #3d3d3d; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #121212; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #f39c12; outline: none; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #d35400, #f39c12); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Raven Guard UI</h2>
        <div class="input-group">
            <label>НИК ПЕРСОНАЖА</label>
            <input type="text" id="nick" placeholder="Введите ник...">
        </div>
        <div class="input-group">
            <label>СТОЙКОСТЬ (БЕЗ КАСТОВ)</label>
            <input type="number" id="res" placeholder="Например: 1250">
        </div>
        <div class="input-group">
            <label>ФЕНКОР (СИМВОЛЫ %)</label>
            <input type="number" id="fc" value="0">
        </div>
        <div class="input-group">
            <label>СКУТ-ТУМ (СИМВОЛЫ %)</label>
            <input type="number" id="sc" value="0">
        </div>
        <button id="main_button">РАССЧИТАТЬ И СОХРАНИТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        document.getElementById("main_button").onclick = function() {
            let data = {
                nick: document.getElementById("nick").value,
                res: parseFloat(document.getElementById("res").value),
                fc: parseFloat(document.getElementById("fc").value),
                sc: parseFloat(document.getElementById("sc").value)
            };
            
            if (!data.nick || isNaN(data.res)) {
                alert("Заполните ник и стойкость!");
                return;
            }

            tg.sendData(JSON.stringify(data)); // Отправка данных боту
            tg.close();
        };
    </script>
</body>
</html>
