<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue-main: #007AFF; --blue-dark: #0A1929; --blue-card: #132F4C; --text: #E3F2FD; }
        body { font-family: -apple-system, sans-serif; background: var(--blue-dark); color: var(--text); margin: 0; padding: 0; }
        
        .tabs { display: flex; background: #132F4C; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold; color: #5AC8FA; opacity: 0.5; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--blue-main); color: #fff; }

        .container { padding: 20px; display: none; }
        .container.active { display: block; }

        .card { background: var(--blue-card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: #5AC8FA; text-align: center; margin: 0 0 15px 0; font-size: 16px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #5AC8FA; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #001E3C; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; background: #007AFF; text-transform: uppercase; }
        .btn-alt { background: transparent; border: 1px solid #007AFF; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div id="t-form" class="tab active" onclick="switchTab('form')">АНКЕТА</div>
        <div id="t-rank" class="tab" onclick="switchTab('rank')">РЕЙТИНГ</div>
    </div>

    <div id="form" class="container active">
        <div class="card">
            <h2>🦅 AngryCrows Intel</h2>
            <div class="input-group">
                <label>Callsign (Ник)</label>
                <input type="text" id="nick" placeholder="Ник...">
            </div>
            <div class="input-group">
                <label>Base Resistance</label>
                <input type="number" id="res">
            </div>
            <div class="input-group">
                <label>Fencor (%)</label>
                <input type="number" id="fc" value="0">
            </div>
            <div class="input-group">
                <label>Skut-Tum (%)</label>
                <input type="number" id="sc" value="0">
            </div>
            <button class="btn" onclick="executeAction('s')">ПЕРЕДАТЬ ДАННЫЕ</button>
        </div>
    </div>

    <div id="rank" class="container">
        <div class="card">
            <h2>🏆 GLOBAL RANKING</h2>
            <button class="btn btn-alt" onclick="executeAction('get_rating')">ВЫВЕСТИ ТОП В ЧАТ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('t-' + tabId).classList.add('active');
        }

        function safeEncode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => 
                String.fromCharCode('0x' + p1)));
        }

        function executeAction(act) {
            const BOT_NAME = "raven_resist_bot";
            let payload = { a: act };

            if (act === 's') {
                let n = document.getElementById('nick').value.trim();
                let r = parseFloat(document.getElementById('res').value);
                if (!n || isNaN(r)) { tg.showAlert("Заполните ник и стойкость!"); return; }
                
                payload.n = n; 
                payload.r = r;
                payload.f = parseFloat(document.getElementById('fc').value || 0);
                payload.s = parseFloat(document.getElementById('sc').value || 0);
            }

            try {
                let encoded = safeEncode(JSON.stringify(payload));
                tg.openTelegramLink("https://t.me/" + BOT_NAME + "?start=" + encoded);
                setTimeout(() => { tg.close(); }, 400);
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>
