<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --accent-blue: #007AFF;
            --soft-blue: #E3F2FD;
            --white: #FFFFFF;
            --text-dark: #1C1C1E;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #B8C6DB 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .header-tabs {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(0, 122, 255, 0.1);
        }

        .tab-btn {
            flex: 1; padding: 15px; text-align: center;
            font-weight: 600; color: #8E8E93;
            transition: all 0.3s ease; border: none; background: none;
        }

        .tab-btn.active {
            color: var(--accent-blue);
            box-shadow: inset 0 -3px 0 var(--accent-blue);
        }

        .content-section { padding: 20px; display: none; }
        .content-section.active { display: block; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.1);
            margin-bottom: 20px;
        }

        h2 { color: var(--accent-blue); margin: 0 0 20px 0; text-align: center; font-size: 1.4rem; }

        .input-box { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 6px; padding-left: 4px; }
        input {
            width: 100%; padding: 14px;
            background: var(--white);
            border: 1px solid rgba(0, 122, 255, 0.2);
            border-radius: 14px; color: var(--text-dark);
            box-sizing: border-box; font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1); }

        .action-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(45deg, #007AFF, #00C6FF);
            border: none; border-radius: 16px;
            color: white; font-weight: 700; font-size: 1rem;
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.3);
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:active { transform: scale(0.97); }

        /* Стиль для рейтинга */
        .rating-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: rgba(255,255,255,0.5);
            border-radius: 16px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .nick-tag { font-weight: 700; color: var(--text-dark); }
        .score-tag { color: var(--accent-blue); font-weight: 800; }
        .del-btn { background: #FF3B30; color: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="header-tabs">
        <button class="tab-btn active" onclick="switchTab('form')">АНКЕТА</button>
        <button class="tab-btn" onclick="switchTab('top')">РЕЙТИНГ</button>
    </div>

    <div id="form-sec" class="content-section active animate__animated animate__fadeIn">
        <div class="glass-card">
            <h2>🛡 Raven Guard</h2>
            <div class="input-box">
                <label>НИК ПЕРСОНАЖА</label>
                <input type="text" id="nick" placeholder="Введите ник...">
            </div>
            <div class="input-box">
                <label>СТОЙКОСТЬ</label>
                <input type="number" id="res" placeholder="Базовое значение">
            </div>
            <div class="input-box">
                <label>СИМВОЛЫ ФЕНКОРА (%)</label>
                <input type="number" id="fc" value="0" step="0.1">
            </div>
            <div class="input-box">
                <label>СИМВОЛЫ СКУТ-ТУМ (%)</label>
                <input type="number" id="sc" value="0" step="0.1">
            </div>
            <button class="action-btn" onclick="execAction('save')">ОТПРАВИТЬ ДАННЫЕ</button>
        </div>
    </div>

    <div id="top-sec" class="content-section animate__animated animate__fadeIn">
        <div class="glass-card">
            <h2>🏆 Топ Листа</h2>
            <p style="font-size: 0.8rem; text-align: center; color: #8E8E93;">Для обновления или удаления игрока выберите действие ниже</p>
            <div class="input-box">
                <input type="text" id="target-nick" placeholder="Ник для удаления...">
            </div>
            <button class="action-btn" style="background: #FF3B30;" onclick="execAction('delete')">УДАЛИТЬ ИЗ БАЗЫ</button>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <button class="action-btn" style="background: var(--accent-blue);" onclick="execAction('get_rating')">ПОКАЗАТЬ В ЧАТЕ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#F5F7FA';

        function switchTab(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(id + '-sec').classList.add('active');
            event.target.classList.add('active');
        }

        function execAction(act) {
            let payload = { action: act };

            if (act === 'save') {
                payload.nick = document.getElementById('nick').value.trim();
                payload.res = parseFloat(document.getElementById('res').value);
                payload.fc = parseFloat(document.getElementById('fc').value || 0);
                payload.sc = parseFloat(document.getElementById('sc').value || 0);
                
                if (!payload.nick || isNaN(payload.res)) {
                    tg.showAlert("Заполните ник и стойкость!");
                    return;
                }
            } else if (act === 'delete') {
                payload.nick = document.getElementById('target-nick').value.trim();
                if (!payload.nick) {
                    tg.showAlert("Введите ник для удаления!");
                    return;
                }
            }

            tg.sendData(JSON.stringify(payload));
        }
    </script>
</body>
</html>
