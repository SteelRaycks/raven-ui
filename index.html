<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #FF4500; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: var(--dark); color: white; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 15px; border: 1px solid var(--accent); }
        h2 { color: var(--accent); text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #888; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #debug-log { margin-top: 20px; font-size: 10px; color: #555; word-break: break-all; }
    </style>
</head>
<body>
    <h2>🦅 AngryCrows Tactical</h2>
    <div class="card">
        <div class="input-group">
            <label>CALLSIGN (НИК)</label>
            <input type="text" id="nick" placeholder="Reyks">
        </div>
        <div class="input-group">
            <label>RESISTANCE (СТОЙКОСТЬ)</label>
            <input type="number" id="res">
        </div>
        <div class="input-group">
            <label>FENCOR SYMBOLS (%)</label>
            <input type="number" id="fc" value="0">
        </div>
        <div class="input-group">
            <label>SKUT-TUM (%)</label>
            <input type="number" id="sc" value="0">
        </div>
        <button class="btn" onclick="sendData()">ОТПРАВИТЬ ДАННЫЕ</button>
    </div>
    <div id="debug-log"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function log(msg) {
            document.getElementById('debug-log').innerText += "\n> " + msg;
        }

        function sendData() {
            const BOT_NAME = "raven_resist_bot";
            log("Начинаю сбор данных...");

            let nick = document.getElementById('nick').value.trim();
            let res = parseFloat(document.getElementById('res').value);

            if (!nick || isNaN(res)) {
                tg.showAlert("ОШИБКА: Заполните ник и стойкость!");
                return;
            }

            let payload = {
                a: "s",
                n: nick,
                r: res,
                f: parseFloat(document.getElementById('fc').value || 0),
                s: parseFloat(document.getElementById('sc').value || 0)
            };

            try {
                let encoded = btoa(JSON.stringify(payload));
                let finalLink = `https://t.me/${BOT_NAME}?start=${encoded}`;
                
                log("Ссылка сформирована. Пытаюсь открыть...");
                
                // Включаем отладку: показываем ссылку перед переходом
                tg.showConfirm("Перейти по ссылке отладки? \n" + finalLink, (ok) => {
                    if (ok) {
                        tg.openTelegramLink(finalLink);
                        setTimeout(() => { tg.close(); }, 500);
                    }
                });

            } catch (e) {
                log("КРИТИЧЕСКАЯ ОШИБКА: " + e.message);
                tg.showAlert("Ошибка JS: " + e.message);
            }
        }
    </script>
</body>
</html>
