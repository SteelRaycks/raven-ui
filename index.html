<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Навигация */
        .tabs { display: flex; background: #000; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--gold); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #888; transition: 0.3s; }
        .tab.active { color: var(--gold); background: var(--card); }

        .container { padding: 20px; display: none; animation: fadeIn 0.3s; }
        .container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        h2 { color: var(--gold); margin: 0 0 15px 0; text-transform: uppercase; font-size: 1.1em; text-align: center; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7em; color: var(--gold); margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 16px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-calc { background: linear-gradient(45deg, var(--accent), var(--gold)); margin-top: 10px; }
        
        /* Список рейтинга */
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; }
        .player-info { flex-grow: 1; }
        .player-name { font-weight: bold; color: var(--gold); }
        .player-rate { font-size: 0.9em; color: #fff; }
        .actions { display: flex; gap: 10px; }
        .btn-small { padding: 8px; border-radius: 5px; font-size: 0.8em; border: none; color: #fff; cursor: pointer; }
        .btn-edit { background: #2980b9; }
        .btn-del { background: #c0392b; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="openTab('calc')">КАЛЬКУЛЯТОР</div>
        <div class="tab" onclick="openTab('rating')">РЕЙТИНГ</div>
    </div>

    <div id="calc" class="container active">
        <div class="card">
            <h2>Расчет параметров</h2>
            <div class="input-group">
                <label>НИК ПЕРСОНАЖА</label>
                <input type="text" id="nick" placeholder="Raycks...">
            </div>
            <div class="input-group">
                <label>СТОЙКОСТЬ (ЧИСТАЯ)</label>
                <input type="number" id="res" placeholder="1250">
            </div>
            <div class="input-group">
                <label>СИМВОЛЫ ФЕНКОРА (%)</label>
                <input type="number" id="fc" value="0" step="0.1">
            </div>
            <div class="input-group">
                <label>СИМВОЛЫ СКУТ-ТУМ (%)</label>
                <input type="number" id="sc" value="0" step="0.1">
            </div>
            <button class="btn btn-calc" onclick="sendData('save')">СОХРАНИТЬ В РЕЙТИНГ</button>
        </div>
    </div>

    <div id="rating" class="container">
        <div class="card">
            <h2>ТОП Raven Guard</h2>
            <div id="rating-list">Загрузка данных...</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(tabId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'rating') loadRating();
        }

        // Отправка данных боту через sendData (для простоты)
        function sendData(action, extraData = null) {
            let nick = document.getElementById("nick").value.trim();
            let res = document.getElementById("res").value;

            if (action === 'save' && (!nick || !res)) {
                tg.showAlert("Заполните ник и стойкость!");
                return;
            }

            let payload = {
                action: action,
                nick: nick,
                res: parseFloat(res),
                fc: parseFloat(document.getElementById("fc").value || 0),
                sc: parseFloat(document.getElementById("sc").value || 0),
                ...extraData
            };

            tg.sendData(JSON.stringify(payload));
        }

        // В этой версии мы всё еще используем sendData для записи, 
        // но добавим "заглушку" для рейтинга, которую будет обновлять бот
        function loadRating() {
            // В чистом Web App без внешнего сервера базы данных мы просим бота прислать нам рейтинг сообщением
            tg.sendData(JSON.stringify({action: 'get_rating'}));
            tg.close();
        }

        // Функция для удаления (вызывается из списка)
        function deletePlayer(name) {
            if(confirm(`Удалить ${name}?`)) {
                tg.sendData(JSON.stringify({action: 'delete', nick: name}));
            }
        }
    </script>
</body>
</html>
