<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #FF4500; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        #debug { margin-top: 15px; padding: 10px; background: #000; border-radius: 5px; font-family: monospace; font-size: 10px; color: #666; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦅 ANGRY CROWS TACTICAL</h1>
    </div>

    <div class="card">
        <div class="input-group">
            <label>OPERATIVE CALLSIGN (НИК)</label>
            <input type="text" id="nick" placeholder="Введите ник...">
        </div>
        <div class="input-group">
            <label>CORE RESISTANCE (СТОЙКОСТЬ)</label>
            <input type="number" id="res" placeholder="Чистое значение">
        </div>
        <div class="input-group">
            <label>FENCOR SYMBOLS (%)</label>
            <input type="number" id="fc" value="0" step="0.1">
        </div>
        <div class="input-group">
            <label>SKUT-TUM SYMBOLS (%)</label>
            <input type="number" id="sc" value="0" step="0.1">
        </div>
        <button class="btn" onclick="transmitData()">ПЕРЕДАТЬ ДАННЫЕ</button>
        <div id="debug"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function transmitData() {
            const BOT_NAME = "raven_resist_bot";
            const debugBox = document.getElementById('debug');
            
            let nick = document.getElementById('nick').value.trim();
            let res = parseFloat(document.getElementById('res').value);

            if (!nick || isNaN(res)) {
                tg.showAlert("⚠️ ОШИБКА: CALLSIGN и RESISTANCE обязательны!");
                return;
            }

            let payload = {
                a: "s",
                n: nick,
                r: res,
                f: parseFloat(document.getElementById('fc').value || 0),
                s: parseFloat(document.getElementById('sc').value || 0)
            };

            try {
                // Безопасное кодирование для поддержки русского языка
                let jsonStr = JSON.stringify(payload);
                let encoded = btoa(unescape(encodeURIComponent(jsonStr)));
                let link = `https://t.me/${BOT_NAME}?start=${encoded}`;
                
                debugBox.style.display = "block";
                debugBox.innerText = "LINK READY: " + link;

                // Передаем данные в Telegram
                tg.openTelegramLink(link);
                setTimeout(() => { tg.close(); }, 500);
            } catch (err) {
                tg.showAlert("CRITICAL ERROR: " + err.message);
            }
        }
    </script>
</body>
</html>
