<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --blue: #007AFF; --bg: #f5f7fa; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); margin: 0; padding: 0; min-height: 100vh; color: #1c1c1e; }
        
        .tabs { display: flex; background: var(--glass); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,122,255,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 600; color: #8e8e93; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--blue); box-shadow: inset 0 -3px 0 var(--blue); }

        .container { padding: 20px; display: none; }
        .container.active { display: block; }

        .glass-card { background: var(--glass); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid white; }
        h2 { color: var(--blue); text-align: center; margin-top: 0; font-size: 1.4rem; }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--blue); margin-bottom: 6px; padding-left: 4px; }
        input { width: 100%; padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; box-sizing: border-box; font-size: 16px; background: white; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; color: white; font-weight: 800; font-size: 1rem; cursor: pointer; background: linear-gradient(45deg, #007AFF, #00C6FF); box-shadow: 0 5px 15px rgba(0,122,255,0.3); transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="tabs">
        <div id="t-calc" class="tab active" onclick="switchTab('calc')">АНКЕТА</div>
        <div id="t-rank" class="tab" onclick="switchTab('rank')">РЕЙТИНГ</div>
    </div>

    <div id="calc" class="container active animate__animated animate__fadeIn">
        <div class="glass-card">
            <h2>🛡 Raven Guard</h2>
            <div class="input-group">
                <label>НИК ПЕРСОНАЖА</label>
                <input type="text" id="nick" placeholder="Введите ник...">
            </div>
            <div class="input-group">
                <label>СТОЙКОСТЬ (БЕЗ ФЕНКОРА)</label>
                <input type="number" id="res" placeholder="Например: 1200">
            </div>
            <div class="input-group">
                <label>СИМВОЛЫ ФЕНКОРА (%)</label>
                <input type="number" id="fc" value="0" step="0.1">
            </div>
            <div class="input-group">
                <label>СИМВОЛЫ СКУТ-ТУМ (%)</label>
                <input type="number" id="sc" value="0" step="0.1">
            </div>
            <button class="btn-main" onclick="execute('s')">ОТПРАВИТЬ ОТЧЕТ</button>
        </div>
    </div>

    <div id="rank" class="container animate__animated animate__fadeIn">
        <div class="glass-card">
            <h2>🏆 Управление</h2>
            <button class="btn-main" style="margin-bottom: 20px; background: #34C759;" onclick="execute('get_rating')">ПОКАЗАТЬ ТОП-ЛИСТ</button>
            <div class="input-group">
                <label>НИК ДЛЯ УДАЛЕНИЯ</label>
                <input type="text" id="del_nick" placeholder="Кому стереть данные?">
            </div>
            <button class="btn-main" style="background: #FF3B30;" onclick="execute('delete')">УДАЛИТЬ ИГРОКА</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#f5f7fa';

        function switchTab(t) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('t-' + t).classList.add('active');
        }

        function execute(action) {
            // ПРЯМАЯ ССЫЛКА НА ТВОЕГО БОТА
            const BOT_NAME = "raven_resist_bot"; 
            
            let data = { a: action };

            if (action === 's') {
                data.n = document.getElementById('nick').value.trim();
                data.r = parseFloat(document.getElementById('res').value);
                data.f = parseFloat(document.getElementById('fc').value || 0);
                data.s = parseFloat(document.getElementById('sc').value || 0);
                if (!data.n || isNaN(data.r)) { tg.showAlert("Заполните ник и стойкость!"); return; }
            } else if (action === 'delete') {
                data.n = document.getElementById('del_nick').value.trim();
                if (!data.n) { tg.showAlert("Введите ник игрока!"); return;
